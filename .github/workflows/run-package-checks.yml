# Package Checks Workflow
#
# Builds the distributable and validates the published package surface with
# publint and Are the Types Wrong (which models Node.js and bundler resolution).

name: Run Package Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  run-package-checks:
    name: Run Package Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build Distributable
        run: bun run build

      - name: Validate Package Surface
        run: |
          bun run publint
          bun run attw
